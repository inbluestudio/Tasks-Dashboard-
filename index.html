<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Design Studio — إدارة المهام والوقت (المرحلة 2)</title>
  
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, set } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // إعدادات الربط السحابي لـ Blue Design Studio
    const firebaseConfig = {
      apiKey: "AIzaSyD1qYudjPjPLGSEclPzW_wjHiXnoKHmj0c",
      authDomain: "task-dashboard-68e99.firebaseapp.com",
      projectId: "task-dashboard-68e99",
      storageBucket: "task-dashboard-68e99.firebasestorage.app",
      messagingSenderId: "105243462131",
      appId: "1:105243462131:web:c049ff5f313e351a2f2a86",
      databaseURL: "https://task-dashboard-68e99-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.dbRefs = { ref, push, onValue, remove, update, db };
  </script>

  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: #16161a;
      --sidebar-bg: #0f0f12;
      --accent: #6366f1;
      --text: #f3f4f6;
      --border: rgba(255, 255, 255, 0.08);
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    .sidebar { width: 240px; background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
    .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-bottom: 30px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    
    .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { background: rgba(99, 102, 241, 0.1); }
    .nav-item.active { background: var(--accent); color: white; }

    .main { flex: 1; padding: 30px; overflow-y: auto; }
    .section { display: none; }
    .section.active { display: block; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .column { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 15px; min-height: 70vh; border: 1px solid var(--border); }
    .column h3 { font-size: 0.95rem; margin-bottom: 20px; opacity: 0.7; }

    .card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; transition: 0.2s; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .card .project-name { font-size: 0.7rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .card .title { font-weight: 500; margin: 8px 0; font-size: 0.95rem; }
    
    .timer-display { font-family: monospace; font-size: 1.1rem; color: var(--green); margin: 10px 0; display: block; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 8px; text-align: center; border: 1px dashed rgba(16, 185, 129, 0.3); }
    .timer-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
    .timer-btn.start { background: var(--green); color: #000; }
    .timer-btn.stop { background: var(--red); color: #fff; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
    .stat-card h2 { font-size: 2.2rem; color: var(--accent); margin-bottom: 5px; }

    .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .chart-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); height: 380px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
    .modal.active { display: flex; }
    .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid var(--border); }
    
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #0a0a0c; border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; }
    input:focus { border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; font-size: 1rem; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    th { color: var(--accent); font-weight: 600; background: rgba(255,255,255,0.02); }
    tr:hover { background: rgba(255,255,255,0.01); }

    .badge-user { font-size: 0.75rem; color: var(--green); display: flex; align-items: center; gap: 5px; opacity: 0.8; }
  </style>
</head>

<body>
  <aside class="sidebar">
    <div class="logo">BLUE DESIGN</div>
    <div class="nav-item active" data-target="kanban">📋 لوحة المهام</div>
    <div class="nav-item" data-target="dashboard">📊 الإحصائيات</div>
    <div class="nav-item" data-target="reports">📄 تقارير المشاريع</div>
  </aside>

  <main class="main">
    <!-- قسم المهام -->
    <section id="kanban" class="section active">
      <div class="header">
        <h1>المهام والوقت المباشر</h1>
        <button onclick="document.getElementById('taskModal').classList.add('active')" class="btn-primary" style="width: auto; padding: 10px 25px;">+ مهمة جديدة</button>
      </div>
      <div class="board">
        <div class="column" data-status="pending"><h3>⏳ انتظار</h3><div class="list" id="list-pending"></div></div>
        <div class="column" data-status="inprogress"><h3>🔄 تنفيذ</h3><div class="list" id="list-inprogress"></div></div>
        <div class="column" data-status="completed"><h3>✅ مكتمل</h3><div class="list" id="list-completed"></div></div>
      </div>
    </section>

    <!-- قسم الإحصائيات -->
    <section id="dashboard" class="section">
      <h1>📊 لوحة المعلومات والتحليلات</h1>
      <div class="stats-grid">
        <div class="stat-card"><h2 id="stat-total-tasks">0</h2><p>إجمالي المهام</p></div>
        <div class="stat-card"><h2 id="stat-total-hours" style="color: var(--green)">0</h2><p>ساعات العمل الكلية</p></div>
        <div class="stat-card"><h2 id="stat-active-projects" style="color: var(--amber)">0</h2><p>مشاريع نشطة</p></div>
      </div>
      <div class="charts-container">
        <div class="chart-box"><canvas id="statusChart"></canvas></div>
        <div class="chart-box"><canvas id="teamChart"></canvas></div>
      </div>
    </section>

    <!-- قسم تقارير المشاريع -->
    <section id="reports" class="section">
      <h1>📄 تقارير ساعات العمل لكل مشروع</h1>
      <div class="chart-box" style="height: auto; margin-top: 20px;">
        <table>
          <thead>
            <tr>
              <th>المشروع الهندسي</th>
              <th>المهام</th>
              <th>إجمالي الوقت</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="project-report-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- نافذة إضافة مهمة -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <h2>إضافة مهمة جديدة للمكتب</h2>
      <input type="text" id="projName" placeholder="اسم المشروع (مثلاً: فيلا دبي)">
      <input type="text" id="taskTitle" placeholder="عنوان المهمة (مثلاً: ريندر المطبخ)">
      <input type="text" id="staffName" placeholder="المصمم المسؤول">
      <select id="teamType">
        <option value="3D Design">تصميم 3D</option>
        <option value="Interior">تصميم داخلي</option>
        <option value="Unreal Engine">ريندر Unreal</option>
      </select>
      <button class="btn-primary" onclick="createNewTask()">إضافة للمشروع 🚀</button>
      <button onclick="document.getElementById('taskModal').classList.remove('active')" style="background:transparent; color:#999; border:none; width:100%; margin-top:10px; cursor:pointer;">إلغاء</button>
    </div>
  </div>

  <script type="module">
    let allTasks = {};
    let statusChart, teamChart;

    setTimeout(() => {
        const { ref, push, onValue, remove, update, db } = window.dbRefs;

        // --- 1. الملاحة السلسة ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                const target = item.dataset.target;
                document.getElementById(target).classList.add('active');
                if(target === 'dashboard') renderCharts();
                if(target === 'reports') renderProjectReports();
            }
        });

        // --- 2. جلب البيانات اللحظي ---
        onValue(ref(db, 'tasks'), (snapshot) => {
            allTasks = snapshot.val() || {};
            renderBoard();
            updateGlobalStats();
            // تحديث الإحصائيات إذا كان القسم مفتوحاً
            if(document.getElementById('dashboard').classList.contains('active')) renderCharts();
            if(document.getElementById('reports').classList.contains('active')) renderProjectReports();
        });

        function renderBoard() {
            document.querySelectorAll('.column .list').forEach(l => l.innerHTML = '');
            Object.keys(allTasks).forEach(id => {
                const t = allTasks[id];
                const card = document.createElement('div');
                card.className = 'card';
                const isRunning = t.timerRunning || false;
                
                card.innerHTML = `
                    <div class="project-name">${t.projectName}</div>
                    <div class="title">${t.title}</div>
                    <div class="timer-display" id="timer-${id}">${formatTime(t.totalSeconds || 0)}</div>
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <button class="timer-btn ${isRunning ? 'stop' : 'start'}" onclick="toggleTimer('${id}')">
                            ${isRunning ? '⏹ إيقاف المؤقت' : '▶ بدء العمل'}
                        </button>
                    </div>
                    <div class="footer">
                        <span class="badge-user">👤 ${t.assignedTo}</span>
                        <span style="opacity:0.5">${t.team}</span>
                    </div>
                    <div style="margin-top:15px; display:flex; gap:8px; border-top:1px solid var(--border); padding-top:10px;">
                        <button onclick="updateStatus('${id}', 'completed')" style="font-size:0.65rem; cursor:pointer; background:none; border:1px solid #444; color:#999; padding:4px 8px; border-radius:5px;">إنهاء</button>
                        <button onclick="deleteTask('${id}')" style="font-size:0.65rem; cursor:pointer; background:none; border:none; color:var(--red);">حذف</button>
                    </div>
                `;
                document.getElementById(`list-${t.status}`).appendChild(card);
            });
        }

        // --- 3. محرك تتبع الوقت ---
        window.toggleTimer = (id) => {
            const t = allTasks[id];
            const now = Date.now();
            if(!t.timerRunning) {
                update(ref(db, `tasks/${id}`), {
                    timerRunning: true,
                    lastStartTime: now,
                    status: 'inprogress'
                });
            } else {
                const elapsedSinceLastStart = Math.floor((now - t.lastStartTime) / 1000);
                const newTotal = (t.totalSeconds || 0) + elapsedSinceLastStart;
                update(ref(db, `tasks/${id}`), {
                    timerRunning: false,
                    totalSeconds: newTotal
                });
            }
        };

        // تحديث الواجهة كل ثانية (Local Refresh)
        setInterval(() => {
            Object.keys(allTasks).forEach(id => {
                const t = allTasks[id];
                if(t.timerRunning) {
                    const currentElapsed = Math.floor((Date.now() - t.lastStartTime) / 1000);
                    const displayTotal = (t.totalSeconds || 0) + currentElapsed;
                    const el = document.getElementById(`timer-${id}`);
                    if(el) el.innerText = formatTime(displayTotal);
                }
            });
        }, 1000);

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        // --- 4. العمليات الإدارية ---
        window.createNewTask = () => {
            const p = document.getElementById('projName').value;
            const t = document.getElementById('taskTitle').value;
            if(!p || !t) return alert("يرجى إدخال اسم المشروع وعنوان المهمة");
            push(ref(db, 'tasks'), {
                projectName: p,
                title: t,
                assignedTo: document.getElementById('staffName').value || "غير محدد",
                team: document.getElementById('teamType').value,
                status: 'pending',
                totalSeconds: 0,
                timerRunning: false,
                createdAt: Date.now()
            });
            document.getElementById('taskModal').classList.remove('active');
            document.querySelectorAll('#taskModal input').forEach(i => i.value = '');
        };

        window.updateStatus = (id, status) => update(ref(db, `tasks/${id}`), { status, timerRunning: false });
        window.deleteTask = (id) => confirm("هل أنت متأكد من الحذف النهائي؟") && remove(ref(db, `tasks/${id}`));

        function updateGlobalStats() {
            const tasksArr = Object.values(allTasks);
            const totalSecs = tasksArr.reduce((acc, t) => acc + (t.totalSeconds || 0), 0);
            document.getElementById('stat-total-tasks').innerText = tasksArr.length;
            document.getElementById('stat-total-hours').innerText = (totalSecs / 3600).toFixed(1);
            const projects = [...new Set(tasksArr.map(t => t.projectName))];
            document.getElementById('stat-active-projects').innerText = projects.length;
        }

        function renderCharts() {
            const tasksArr = Object.values(allTasks);
            const statusData = [
                tasksArr.filter(t => t.status === 'pending').length,
                tasksArr.filter(t => t.status === 'inprogress').length,
                tasksArr.filter(t => t.status === 'completed').length
            ];

            if(statusChart) statusChart.destroy();
            statusChart = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['انتظار', 'تنفيذ', 'مكتمل'],
                    datasets: [{ data: statusData, backgroundColor: ['#f59e0b', '#6366f1', '#10b981'], borderWidth: 0 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { family: 'IBM Plex Sans Arabic' } } } } }
            });

            const teams = ["3D Design", "Interior", "Unreal Engine"];
            const teamData = teams.map(team => tasksArr.filter(t => t.team === team).length);

            if(teamChart) teamChart.destroy();
            teamChart = new Chart(document.getElementById('teamChart'), {
                type: 'bar',
                data: {
                    labels: teams,
                    datasets: [{ label: 'المهام حسب الفريق', data: teamData, backgroundColor: '#6366f1', borderRadius: 5 }]
                },
                options: { maintainAspectRatio: false, scales: { y: { ticks: { color: '#999' } }, x: { ticks: { color: '#999' } } } }
            });
        }

        function renderProjectReports() {
            const reportBody = document.getElementById('project-report-body');
            reportBody.innerHTML = '';
            const projectsMap = {};
            Object.values(allTasks).forEach(t => {
                if(!projectsMap[t.projectName]) projectsMap[t.projectName] = { count: 0, seconds: 0 };
                projectsMap[t.projectName].count++;
                projectsMap[t.projectName].seconds += (t.totalSeconds || 0);
            });

            Object.keys(projectsMap).forEach(p => {
                const row = `<tr>
                    <td>${p}</td>
                    <td>${projectsMap[p].count}</td>
                    <td style="color:var(--green); font-family:monospace;">${formatTime(projectsMap[p].seconds)}</td>
                    <td>${projectsMap[p].seconds > 72000 ? '🔴 مجهود مكثف' : '🟢 سير طبيعي'}</td>
                </tr>`;
                reportBody.innerHTML += row;
            });
        }

    }, 2000);
  </script>
</body>
</html>
